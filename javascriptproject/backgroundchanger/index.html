<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backgound changer</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>

    <div class="flex justify-center items-center h-[100vh] w-[100vw] p-10 gap-6  ">
        <button id="red" class="bg-red-500 border-red-500 rounded-md text-sm font-bold text-white min-w-[100px] min-h-[50px] hover:bg-red-600">Red</button>
        <button id="green" class="bg-green-500 border-green-500 rounded-md text-sm font-bold text-white min-w-[100px] min-h-[50px] hover:bg-green-600">Green</button>
        <button id="yellow" class="bg-yellow-500 border-yellow-500 rounded-md text-sm font-bold text-white min-w-[100px] min-h-[50px] hover:bg-yellow-600">Yellow</button>
        <button id="purple" class="bg-purple-500 border-purple-500 rounded-md text-sm font-bold text-white min-w-[100px] min-h-[50px] hover:bg-purple-600">Purple</button>
        <button id="pink" class="bg-pink-500 border-pink-500 rounded-md text-sm font-bold text-white min-w-[100px] min-h-[50px] hover:bg-pink-600">Pink</button>
    </div>
    
       <script src="backgroundchanger.js"></script>
</body>
</html>
