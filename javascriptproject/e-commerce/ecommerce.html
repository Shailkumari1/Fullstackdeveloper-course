<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-COMMERCE website</title>

        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>
<body>

    <nav>
        <div class="flex justify-between items-center bg-yellow-400 sticky top-0">
            <div id="logo" class="flex items-center gap-2 p-3 font-bold text-2xl">
                <span class="material-symbols-outlined text-3xl text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-purple-600 to-pink-500 drop-shadow-lg">menu_book</span>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-purple-600 to-pink-500 drop-shadow-lg">
                    YOURSCHOICE
                </span>
            </div>
        <div class="flex justify-center items-center">
            <span class="material-symbols-outlined text-blue-500 text-5xl p-2">search</span>
            <input type="search" placeholder="Search books" class=" bg-white border-2 rounded-full h-10 w-100 text-center text-md text-blue-600 border-blue-500 focus: border-blue-700 focus:ring-blue-500 focus:outline-none">
        </div>
        <div class="flex justify-center items-center gap-2 p-2 m-4">
            <span class="material-symbols-outlined text-5xl text-blue-500">account_circle</span>
            <button class="text-md text-blue-500 ">SignIn</button>
            <span class="material-symbols-outlined text-5xl text-blue-500">garden_cart</span>
            <button class="text-md text-blue-500">cart</button>
        </div>
        </div>

        

        <div >
            <ul class=" text-lg flex justify-center-safe gap-10 bg-gradient-to-r from-blue-500 via-cyan-400 to-teal-400 p-3 text-white font-bold">
                <li><a href="#" class="hover:text-yellow-200 transition">Home</a></li>
                <li><a href="#" class="hover:text-yellow-200 transition">Books</a></li>
                <li><a href="#" class="hover:text-yellow-200 transition">Stationary</a></li>
                <li><a href="#" class="hover:text-yellow-200 transition">Gifts</a></li>
                <li><a href="#" class="hover:text-yellow-200 transition">Contact Us</a></li>
            </ul>
        </div>
    </nav>

    <main>
        
        <section class="relative w-full h-[560px] mt-2 overflow-hidden rounded-lg">
            <!-- background -->
            <img
                class="absolute w-full h-full object-cover brightness-40"
                src="https://images.unsplash.com/photo-1746954546450-6cfc9b75920c?w=1920&auto=format&fit=crop&q=80&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTV8fHNpbmdsZSUyMGJvb2t8ZW58MHx8MHx8fDA%3D"
                
                alt="books image"
            >

            <!-- herosection? -->
              <div class="absolute items-center flex flex-col jusify-center text-center top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
                <h1 class="text-4xl font-bold text-white mb-6 animate-pulse ">Welcome to YourChoice</h1>
                <p class="text-2xl text-white mb-6 animate-pulse ">Discover a world of books, stationery, and gifts at YourChoice. Explore our wide selection and find the perfect items for every occasion.</p>
                <button class="bg-yellow-400 text-blue-500 font-bold py-2 px-4 rounded-full hover:bg-yellow-500 transition duration-300 animate-bounce ">Shop Now</button>
              </div>

            
        </section>

    </main>

    
</body>
</html>
