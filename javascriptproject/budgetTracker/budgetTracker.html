<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUDGET TRACKER</title>

        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>

    <div class="flex justify-center bg-black">
    <h1 class="font-bold font-sans text-xl text-white">BUDGET TRACKER</h1>

    </div>

     <div class="flex justify-center item-center p-10 ">
        <form action="submit" class="border-2 rounded-3xl p-14 m-10 text-white bg-gray-700 ">
       
            
        <label for="budget" id="budget" class="text-sm font-bold ">Enter your Budget :</label>
        <input type="text" class="border-1 mt-8 h-7 w-50 rounded-md text-center ml-2">
        <button class="text-sm border bg-white text-gray-700 rounded-xl w-20 h-10 ml-2">Add</button>

     
 

         <div class="mt-6 ">
        
            <input type="text" placeholder="Enter Expenses Name" class="border-1 mt-2 h-7 w-50 rounded-md text-center" >
            <input type="text" placeholder="Enter Expenses Amount" class="border-1 mt-2 h-7 w-50 rounded-md text-center ml-2">

            <button class="text-sm border bg-white text-gray-700 rounded-xl w-20 h-10 ml-2">Submit</button>

    
         </div>

         
        
    </form>

        <div>
            <h2 class="text-center text-gray-700 font-bold">Expenses</h2>
        </div>

        </div>
    
</body>
</html>
