<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Login page</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>

    <div class="bg-[#5A9690] h-[100vh] w-[100vw] m-0 m-auto flex justify-center items-center ">
        <div >
             
            <form class="bg-white mb-10 px-20 py-10 rounded-[30px] transform-style-preserve-3d shadow-[10px_10px_40px_0px_rgba(0,0,0,1)] ">
                <h1 class="text-[#5A9690] text-3xl font-bold text-center mb-7">Login</h1>
                <div>
                    <input class="mb-5 w-full h-[40px] px-10 outline-1 outline-[#5A9690] focus:outline-[#5A9690] focus:ring-2 focus:ring-[#5A9690]" type="email" placeholder="Enter your email">

                </div>
                <div>
                    <input class="mb-5 w-full h-[40px] px-10 outline-1 outline-[#5A9690] focus:outline-[#5A9690] focus:ring-2 focus:ring-[#5A9690]"  type="password" placeholder="Enter your password">

                </div>

                <div>
                    <input class="text-[#5A9690] w-4 h-4" type="checkbox">
                    <span class="text-[#2F5755] gap-4 text-md">Remember me</span>
                    <a class="text-[#2F5755] underline gap-4 text-base" href="#">Forgot Password?</a>
                </div>

                <div class="mt-5">
                    <button class="bg-[#2F5755] text-[white] w-[100%] h-[40px]">Login</button>
                </div>

                <div class="mt-4 text-center">
                    <a  class="text-[#2F5755]" href="#">No Account?</a>
                    <a class="text-[#2F5755] underline" href="signup.html">Signup</a>
                </div>
                
            </form>

        </div>
    </div>
    
</body>
</html>
